<table
  mat-table
  [dataSource]="data"
  matflowTable>

  <ng-container matflowTableColumns>
    <!-- ID -->
    <ng-container
      matColumnDef="id"
      matflowTableColumn="ID"
      name="id"
      queryable
      required>

      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let row">
        {{ row.id }}
      </td>

    </ng-container>


    <!-- Name -->
    <ng-container
      matColumnDef="name"
      matflowTableColumn="Name"
      name="name"
      queryable
      groupable>

      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let row">
        {{ row.name }}
      </td>

    </ng-container>


    <!-- Email -->
    <ng-container
      matColumnDef="email"
      matflowTableColumn="Email"
      name="email"
      queryable>

      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let row">
        {{ row.email }}
      </td>

    </ng-container>

    <!-- Country -->
    <ng-container
      matColumnDef="country"
      matflowTableColumn="Country"
      name="country">

      <th mat-header-cell *matHeaderCellDef>Country</th>
      <td mat-cell *matCellDef="let row">
        {{ row.role }}
      </td>

    </ng-container>

    <!-- Role -->
    <ng-container
      matColumnDef="role"
      matflowTableColumn="Role"
      name="role">

      <th mat-header-cell *matHeaderCellDef>Role</th>
      <td mat-cell *matCellDef="let row">
        {{ row.role }}
      </td>

    </ng-container>

    <!-- Department -->
    <ng-container
      matColumnDef="department"
      matflowTableColumn="Department"
      name="department">

      <th mat-header-cell *matHeaderCellDef>Department</th>
      <td mat-cell *matCellDef="let row">
        {{ row.department }}
      </td>

    </ng-container>

    <!-- Active -->
    <ng-container
      matColumnDef="status"
      matflowTableColumn="Active"
      name="status">

      <th mat-header-cell *matHeaderCellDef>Active</th>
      <td mat-cell *matCellDef="let row">
        {{ row.status }}
      </td>
    </ng-container>


    <!-- Country -->
    <ng-container
      matColumnDef="createdAt"
      matflowTableColumn="Created At"
      name="createdAt">

      <th mat-header-cell *matHeaderCellDef>Created At</th>
      <td mat-cell *matCellDef="let row">
        {{ row.createdAt | date:'short'  }}
      </td>

    </ng-container>

  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

</table>
